name: Build add-on images

on:
  push:
    branches: [main]
    paths:
      - "homeassistant-addon/**"
      - ".github/workflows/addon-build.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64, amd64, armv7]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Reads image/version from homeassistant-addon/config.yaml and pushes
      # ghcr.io/<owner>/<arch>-vinted-notifications:<version> (+ latest).
      - name: Build ${{ matrix.arch }} add-on
        uses: home-assistant/builder@master
        with:
          args: |
            --${{ matrix.arch }} \
            --target /data/homeassistant-addon \
            --addon
