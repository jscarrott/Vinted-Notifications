version: '3.8'

networks:
  vinted-network:
    name: vinted-network
    driver: bridge

services:
  vinted-notifications:
    # Build locally so the Signal plugin (signal_plugin/) is included in the image.
    # Swap back to `image: fuyucch1/vinted-notifications:latest` if you don't need Signal.
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vinted-notifications
    ports:
      - "8000:8000"
      - "8080:8080"
    volumes:
      - VN_data:/app/data
      - VN_logs:/app/logs
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    depends_on:
      - signal-cli-rest-api
    networks:
      - vinted-network

  signal-cli-rest-api:
    image: bbernhard/signal-cli-rest-api:latest
    container_name: signal-cli-rest-api
    volumes:
      - signal-data:/home/.local/share/signal-cli
    environment:
      - MODE=normal
      - AUTO_RECEIVE_SMS=true
      - SIGNAL_CLI_ACCOUNT=${SIGNAL_PHONE}  # Set from .env file
    ports:
      - "7778:8080"
    restart: unless-stopped
    networks:
      - vinted-network

volumes:
  VN_data:
  VN_logs:
  signal-data:
    name: signal-data
